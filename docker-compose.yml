version: "3.8"

services:
  exchanger:
    image: python:3.12-slim
    container_name: exchanger
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - exchanger_data:/app/src/data
    restart: unless-stopped
    # Використовуємо інсталяцію залежностей через uv у системний Python контейнера.
    # Це запобігає конфліктам із Windows-папкою `.venv`, якщо вона випадково змонтується з хоста.
    command: sh -c "pip install --no-cache-dir uv && uv pip install --system -r requirements.txt && python src/app.py"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.routers.exchanger.rule=Host(`exchanger.lexis.blog`)
      - traefik.http.routers.exchanger.entrypoints=websecure
      - traefik.http.routers.exchanger.tls.certresolver=letsencrypt
      - traefik.http.services.exchanger.loadbalancer.server.port=5000
    networks:
      - traefik_default

volumes:
  exchanger_data:

networks:
  traefik_default:
    external: true
