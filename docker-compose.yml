version: "3.8"

services:
  exchanger:
    image: python:3.12-slim
    container_name: exchanger
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/.venv  # Анонімний том для ізоляції віртуального оточення контейнера від хоста
      - exchanger_data:/app/src/data
    restart: unless-stopped
    command: sh -c "pip install --no-cache-dir uv && uv sync && uv run python src/app.py"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.routers.exchanger.rule=Host(`exchanger.lexis.blog`)
      - traefik.http.routers.exchanger.entrypoints=websecure
      - traefik.http.routers.exchanger.tls.certresolver=letsencrypt
      - traefik.http.services.exchanger.loadbalancer.server.port=5000
    networks:
      - traefik_default

volumes:
  exchanger_data:

networks:
  traefik_default:
    external: true
