name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            mkdir -p /docker/exchanger
            cd /docker/exchanger
            # Ініціалізуємо репозиторій або стягуємо останні зміни
            if [ ! -d ".git" ]; then
              git clone https://github.com/YAROVISION/EXCHANGER.git .
            else
              git fetch origin
              git reset --hard origin/master
            fi
            # Перезапуск контейнера для застосування оновлень коду та залежностей
            docker compose down
            docker compose up -d
